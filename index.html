<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Oficial - Mecânica</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg,#000,#111);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 500px;
    background: #0f0f0f;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px #00ff88;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tabs button {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 2px solid #00ff88;
    color: #00ff88;
    cursor: pointer;
    border-radius: 8px;
    font-weight: bold;
}

.tabs button.active {
    background: #00ff88;
    color: #000;
}

.section {
    display: none;
}

.section.active {
    display: block;
}

h3 {
    margin: 15px 0 10px;
    border-bottom: 1px solid #00ff88;
    padding-bottom: 5px;
    color: #00ff88;
}

label {
    display: block;
    margin-top: 10px;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    background: #000;
    border: 2px solid #00ff88;
    border-radius: 6px;
    color: #00ff88;
}

button.calc {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: #00ff88;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

button.clear {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: #ff4444;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    color: #fff;
}

.result {
    margin-top: 15px;
    font-size: 18px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
    <button class="active" onclick="trocarAba('normal', this)">Serviços</button>
    <button onclick="trocarAba('parceria', this)">Parcerias</button>
</div>

<!-- ABA NORMAL -->
<div id="normal" class="section active">

<h3>🔧 Serviços</h3>

<label>Reparo (2.500)</label>
<input type="number" id="reparo">

<label>Troca de Pneu (2.500)</label>
<input type="number" id="pneuTroca">

<label>Tuning (50%)</label>
<input type="number" id="tuning" placeholder="Valor base da tunagem">

<h3>🛒 Venda de Itens</h3>

<label>Kit Reparo (3.500)</label>
<input type="number" id="kit">

<label>Pneu (2.000)</label>
<input type="number" id="pneuVenda">

<label>Pé de Cabra (2.500)</label>
<input type="number" id="peCabra">

<label>Corda (5.000)</label>
<input type="number" id="corda">

<label>Chave Inglesa (2.500)</label>
<input type="number" id="chave">

<button class="calc" onclick="calcularNormal()">CALCULAR TOTAL</button>
<button class="clear" onclick="limpar()">LIMPAR TUDO</button>

<div class="result" id="resultadoNormal"></div>

</div>

<!-- ABA PARCERIA -->
<div id="parceria" class="section">

<h3>🤝 Serviços (Parceria)</h3>

<label>Reparo (2.000)</label>
<input type="number" id="reparoP">

<label>Troca de Pneu (2.000)</label>
<input type="number" id="pneuTrocaP">

<label>Tuning (30%)</label>
<input type="number" id="tuningP" placeholder="Valor base da tunagem">

<h3>🛒 Venda de Itens (Parceria)</h3>

<label>Kit Reparo (3.000)</label>
<input type="number" id="kitP">

<label>Pneu (1.500)</label>
<input type="number" id="pneuVendaP">

<label>Pé de Cabra (2.000)</label>
<input type="number" id="peCabraP">

<label>Corda (4.000)</label>
<input type="number" id="cordaP">

<label>Chave Inglesa (2.000)</label>
<input type="number" id="chaveP">

<button class="calc" onclick="calcularParceria()">CALCULAR TOTAL</button>
<button class="clear" onclick="limpar()">LIMPAR TUDO</button>

<div class="result" id="resultadoParceria"></div>

</div>

</div>

<script>
function trocarAba(id, botao){
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
    botao.classList.add('active');
}

function calcularNormal(){
    let total = 0;

    total += (parseFloat(reparo.value) || 0) * 2500;
    total += (parseFloat(pneuTroca.value) || 0) * 2500;
    total += (parseFloat(tuning.value) || 0) * 0.5;

    total += (parseFloat(kit.value) || 0) * 3500;
    total += (parseFloat(pneuVenda.value) || 0) * 2000;
    total += (parseFloat(peCabra.value) || 0) * 2500;
    total += (parseFloat(corda.value) || 0) * 5000;
    total += (parseFloat(chave.value) || 0) * 2500;

    resultadoNormal.innerText = "Total: R$ " + total.toLocaleString('pt-BR');
}

function calcularParceria(){
    let total = 0;

    total += (parseFloat(reparoP.value) || 0) * 2000;
    total += (parseFloat(pneuTrocaP.value) || 0) * 2000;
    total += (parseFloat(tuningP.value) || 0) * 0.3;

    total += (parseFloat(kitP.value) || 0) * 3000;
    total += (parseFloat(pneuVendaP.value) || 0) * 1500;
    total += (parseFloat(peCabraP.value) || 0) * 2000;
    total += (parseFloat(cordaP.value) || 0) * 4000;
    total += (parseFloat(chaveP.value) || 0) * 2000;

    resultadoParceria.innerText = "Total: R$ " + total.toLocaleString('pt-BR');
}

function limpar(){
    document.querySelectorAll("input").forEach(input => input.value = "");
    resultadoNormal.innerText = "";
    resultadoParceria.innerText = "";
}
</script>

</body>
</html>
