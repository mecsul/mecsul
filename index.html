<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Oficial - Mecânica Sul</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
html,body{height:100%;overflow-x:hidden;}

#bg-video{
position:fixed;top:0;left:0;width:100%;height:100%;
object-fit:cover;z-index:0;
}

.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.35);
z-index:1;
}

.wrapper{
position:relative;z-index:2;
min-height:100vh;
display:flex;justify-content:center;align-items:center;
padding:40px 15px;
}

.container{
width:100%;max-width:500px;
background:rgba(15,15,15,0.95);
border:1px solid #00ff88;
border-radius:12px;
padding:25px;
box-shadow:0 0 30px rgba(0,255,136,0.5);
backdrop-filter:blur(8px);
color:#fff;
}

.logo{display:flex;justify-content:center;margin-bottom:15px;}
.logo img{width:120px;}

h1{text-align:center;margin-bottom:20px;font-size:22px;}

h2{
margin-top:15px;margin-bottom:10px;
font-size:15px;
border-bottom:1px solid #00ff88;
padding-bottom:5px;
}

.input-group{margin-bottom:10px;}
label{font-size:13px;display:block;margin-bottom:4px;}

input[type="number"]{
width:100%;padding:8px;
background:#000;border:1px solid #00ff88;
color:#fff;border-radius:6px;
}

button{
width:100%;padding:12px;margin-top:12px;
background:#00ff88;color:#000;
border:none;font-weight:bold;
cursor:pointer;border-radius:6px;
transition:.3s;
}

button:hover{background:#00cc6a;box-shadow:0 0 15px #00ff88;}

.btn-limpar{background:#ff4444;color:#fff;}
.btn-limpar:hover{background:#cc0000;box-shadow:0 0 15px #ff4444;}

.resultado{
margin-top:15px;padding:12px;
border:1px solid #00ff88;
text-align:center;font-weight:bold;
border-radius:6px;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="jfundo.mp4?v=3" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="wrapper">
<div class="container">

<div class="logo">
<img src="logo.png" alt="Logo Mecânica Sul">
</div>

<h1>Calculadora Oficial</h1>

<h2>🚨 Atendimento Externo</h2>

<div class="input-group">
<label>Desvirar Veículo (2.500)</label>
<input type="number" id="ext_desvirar">
</div>

<div class="input-group">
<label>Reparo (3.500)</label>
<input type="number" id="ext_reparo">
</div>

<div class="input-group">
<label>Troca de Pneu (1.500)</label>
<input type="number" id="ext_pneu">
</div>

<h2>🏢 Atendimento Interno</h2>

<div class="input-group">
<label>Reparo (2.500)</label>
<input type="number" id="int_reparo">
</div>

<div class="input-group">
<label>Troca de Pneu (1.000)</label>
<input type="number" id="int_pneu">
</div>

<div class="input-group">
<label>Estética / Tuning (valor base)</label>
<input type="number" id="int_tuning">
</div>

<h2>🛒 Venda de Itens</h2>

<div class="input-group">
<label>Elevador Hidráulico (2.500)</label>
<input type="number" id="v_elevador">
</div>

<div class="input-group">
<label>Chave Inglesa (3.500)</label>
<input type="number" id="v_chave">
</div>

<div class="input-group">
<label>Pneu (800)</label>
<input type="number" id="v_pneu">
</div>

<div class="input-group">
<label>Ferramentas Básica (3.000)</label>
<input type="number" id="v_ferramenta">
</div>

<div class="input-group">
<label>Pé de Cabra (4.500)</label>
<input type="number" id="v_pe">
</div>

<div class="input-group">
<label>Corda (5.000)</label>
<input type="number" id="v_corda">
</div>

<button onclick="calcular()">CALCULAR</button>

<div class="resultado" id="resultado">Total: R$ 0</div>

<button class="btn-limpar" onclick="limpar()">LIMPAR TUDO</button>

</div>
</div>

<script>

function calcular(){

let total =

(ext_desvirar.value||0)*2500 +
(ext_reparo.value||0)*3500 +
(ext_pneu.value||0)*1500 +

(int_reparo.value||0)*2500 +
(int_pneu.value||0)*1000 +
(int_tuning.value||0)*1.3 +

(v_elevador.value||0)*2500 +
(v_chave.value||0)*3500 +
(v_pneu.value||0)*800 +
(v_ferramenta.value||0)*3000 +
(v_pe.value||0)*4500 +
(v_corda.value||0)*5000;

resultado.innerText="Total: R$ "+Number(total).toLocaleString('pt-BR');

}

function limpar(){
document.querySelectorAll("input").forEach(i=>i.value="");
resultado.innerText="Total: R$ 0";
}

</script>

</body>
</html>
